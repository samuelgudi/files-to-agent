services:
  files-to-agent:
    image: ghcr.io/samuelgudi/files-to-agent:latest
    pull_policy: always
    container_name: files-to-agent
    restart: unless-stopped
    env_file: .env
    networks:
      - agent-net
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:8080:8080"
    expose:
      - "8080"

networks:
  agent-net:
    name: agent-net
    external: true
